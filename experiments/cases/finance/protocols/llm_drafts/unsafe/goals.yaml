source_protocol: experiments\cases\finance\protocols\llm_drafts\unsafe\v1.scr
re_anchored_from: experiments\cases\finance\case.yaml
n_canonical_goals: 6
n_kept: 6
n_dropped: 0
dropped: []
# Re-anchored by hand on 2026-07-17 after `re_anchor_goals.py finance unsafe
# --check` found four goals anchored on edges that DO NOT EXIST in this
# protocol (HighRevenue, AuditCompleted, FinalizeReport) — so this arm's
# goal scores were partly meaningless. Anchors now point at real edges;
# pass conditions match case.yaml except where the payload TYPE differs
# (G3/G5 carry a predicate_note; G2 keeps the canonical len(x) > 0, which a
# Bool payload's "True"/"False" satisfies). Branch tags restored to match
# the canonical goals (the invariance check requires it).
goals:
- id: G1
  description: High-path revenue must exceed $50,000
  metric: revenue_amount
  predicate: float(x) > 50000
  anchor:
    sender: Fetcher
    receiver: RevenueAnalyst
    label: RawRevenueData
  threshold: '> 50000'
  branch: high
- id: G2
  description: Audit result must be non-empty
  metric: audit_completeness
  predicate: len(x) > 0
  anchor:
    sender: TaxSpecialist
    receiver: RevenueAnalyst
    label: AuditReport
  threshold: non-empty
  branch: high
- id: G3
  description: Tax verifier must approve the audit explicitly
  metric: audit_approval
  predicate: x.lower() == "true"
  predicate_note: translated from canonical '"approved" in x.lower() or "ok" in
    x.lower()' because the payload type changed String -> Bool (payload is only
    ever "True"/"False")
  anchor:
    sender: TaxVerifier
    receiver: RevenueAnalyst
    label: Approval
  threshold: explicit approval (Bool payload == true)
- id: G4
  description: Revenue analysis must be substantive (>10 chars)
  metric: analysis_quality
  predicate: len(x) > 10
  anchor:
    sender: RevenueAnalyst
    receiver: Writer
    label: FinalRevenueAnalysis
  threshold: '> 10 chars'
- id: G5
  description: Expense analysis must be substantive (>10 chars)
  metric: expense_quality
  predicate: len(x) > 0
  predicate_note: translated from canonical 'len(x) > 10' because the payload
    type changed String -> Double (a number cannot be "substantive text"; the
    check degrades to "a value is present")
  anchor:
    sender: ExpenseAnalyst
    receiver: RevenueAnalyst
    label: ExpenseData
  threshold: non-empty (Double payload)
- id: G6
  description: A final quarterly report is produced and delivered to the user, terminating
    the pipeline
  metric: report_delivered
  predicate: 'True'
  anchor:
    sender: Writer
    receiver: Fetcher
    label: GenerateReport
  threshold: terminal event present
